{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Livestock AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #F6FFF8;
    color: #1F2937;
}

.container {
    max-width: 1300px;
    margin: auto;
    padding: 40px 20px;
}

/* ---------- BUTTON ---------- */
.btn-primary {
    background: linear-gradient(135deg, #0F9D58, #1DB954);
    color: white;
    padding: 16px;
    border-radius: 14px;
    border: none;
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s ease;
}
.btn-primary:hover {
    box-shadow: 0 0 14px rgba(15, 157, 88, 0.45);
    transform: translateY(-1px);
}

/* ---------- CARD ---------- */
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

/* login card special border */
.login-card {
    border: 1px solid #E5E7EB;
    box-shadow: 0 10px 24px rgba(0,0,0,0.06);
}

/* ---------- LINK UNDERLINE ---------- */
.link-underline {
    position: relative;
    color: #16A34A;
    font-weight: 600;
}
.link-underline::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 0;
    height: 2px;
    background: #16A34A;
    transition: width 0.25s ease;
}
.link-underline:hover::after {
    width: 100%;
}

/* ---------- FEATURE CARDS ---------- */
.feature-card {
    display: flex;
    gap: 16px;
    border: 2px dashed rgba(0,0,0,0.08);
    margin-bottom: 16px;
    transition: 0.25s ease;
}
.feature-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* colored fades */
.fade-blue { background: linear-gradient(90deg, rgba(37,99,235,0.06), white); }
.fade-purple { background: linear-gradient(90deg, rgba(147,51,234,0.06), white); }
.fade-green { background: linear-gradient(90deg, rgba(22,163,74,0.06), white); }
.fade-orange { background: linear-gradient(90deg, rgba(234,88,12,0.06), white); }

/* ---------- STATS ---------- */
.stat {
    text-align: center;
}
.stat-number {
    font-size: 28px;
    font-weight: 700;
}
.stat-label {
    color: #6B7280;
    font-size: 14px;
}

.section-title {
    margin-top: 32px;
    margin-bottom: 18px;
    font-weight: 600;
}

</style>
</head>

<body>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
