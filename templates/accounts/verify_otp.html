{% extends "base1.html" %}
{% block content %}

<style>
.verify-bg {
    background: radial-gradient(circle at top left, rgba(15,157,88,0.10), transparent 50%),
                radial-gradient(circle at bottom right, rgba(37,99,235,0.08), transparent 50%);
    padding: 60px;
    border-radius: 24px;
}
</style>

<div class="verify-bg">

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

<div class="card login-card" style="
max-width:520px;
width:100%;
text-align:center;
padding:50px;
border:1px solid #D1FAE5;
box-shadow:0 25px 50px rgba(15,157,88,0.08);
">

<div style="
width:90px;height:90px;
background:#F6FFF8;
border:2px solid #0F9D58;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:30px;
font-size:36px;
color:#0F9D58;
">
<i class="fa-solid fa-key"></i>
</div>

<h2 style="margin:0;">Verify Identity</h2>
<p style="color:#6B7280; margin-bottom:30px;">
Check your email for the 6-digit access code
</p>

<form method="POST">
{% csrf_token %}

<input name="otp" maxlength="6" required placeholder="000000"
style="
width:100%;
text-align:center;
font-size:36px;
letter-spacing:12px;
padding:18px;
border-radius:16px;
border:1px solid #E5E7EB;
margin-bottom:24px;
color:#0F9D58;
font-weight:700;
">

<button type="submit" class="btn-primary">
Activate Access Portal
</button>

</form>

<div style="margin-top:24px; font-size:13px; color:#6B7280;">
Didn't receive the code?
<a href="#" class="link-underline">Resend Code</a>
</div>

</div>
</div>
</div>

{% endblock %}
