{% extends "base1.html" %}
{% block content %}

<style>
.verify-bg {
    background: radial-gradient(circle at top left, rgba(239,68,68,0.10), transparent 50%),
                radial-gradient(circle at bottom right, rgba(0,0,0,0.04), transparent 50%);
    padding: 60px;
    border-radius: 24px;
}
</style>

<div class="verify-bg">

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

<div class="card login-card" style="
max-width:520px;
width:100%;
text-align:center;
padding:50px;
border:1px solid #FECACA;
box-shadow:0 25px 50px rgba(239,68,68,0.10);
">

<div style="
width:90px;height:90px;
background:#FEF2F2;
border:2px solid #FCA5A5;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:30px;
font-size:38px;
color:#DC2626;
">
<i class="fa-solid fa-triangle-exclamation"></i>
</div>

<h1 style="margin:0 0 16px;">Verification <span style="color:#DC2626;">Failed</span></h1>

<p style="color:#6B7280; font-size:14px; line-height:1.6;">
The security OTP is invalid or expired.<br>
Please restart the registration process.
</p>

<a href="{% url 'signup' %}" class="btn-primary"
style="
background:#DC2626;
margin-top:24px;
display:inline-block;
width:auto;
padding:14px 28px;
">
<i class="fa-solid fa-rotate-right"></i> Restart Registration
</a>

</div>
</div>
</div>

{% endblock %}
