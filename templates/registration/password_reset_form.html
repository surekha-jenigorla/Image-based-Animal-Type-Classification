{% extends "base1.html" %}
{% load i18n %}
{% block content %}

<style>
.reset-bg {
    background: radial-gradient(circle at top left, rgba(15,157,88,0.10), transparent 50%);
    padding: 60px;
    border-radius: 24px;
}
</style>

<div class="reset-bg">

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

<div class="card login-card" style="
max-width:520px;
width:100%;
padding:40px;
border:1px solid #D1FAE5;
box-shadow:0 25px 50px rgba(15,157,88,0.08);
">

<h2 style="text-align:center;margin-top:0;">Account Recovery</h2>

<form method="post">
{% csrf_token %}

<label>Email Address</label>
<input type="email" name="email" required
style="width:100%;padding:14px;border-radius:12px;border:1px solid #E5E7EB;margin-bottom:20px;">

<button type="submit" class="btn-primary">
{% translate "Send Reset Link" %}
</button>

</form>

</div>
</div>
</div>

{% endblock %}
