{% extends "base1.html" %}
{% load i18n %}
{% block content %}

<style>
.reset-bg {
    background: radial-gradient(circle at top left, rgba(15,157,88,0.12), transparent 50%);
    padding: 60px;
    border-radius: 24px;
}
</style>

<div class="reset-bg">

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

<div class="card login-card" style="
max-width:520px;
width:100%;
text-align:center;
padding:50px;
border:1px solid #D1FAE5;
box-shadow:0 25px 50px rgba(15,157,88,0.10);
">

<div style="
width:90px;height:90px;
background:#F6FFF8;
border:2px solid #0F9D58;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:30px;
font-size:36px;
color:#0F9D58;
">
<i class="fa-solid fa-paper-plane"></i>
</div>

<h1>Email <span style="color:#0F9D58;">Sent</span></h1>

<p style="color:#6B7280; font-size:14px;">
{% translate "Check your inbox for the password reset link." %}
</p>

<a href="{% url 'login' %}" class="link-underline" style="margin-top:16px; display:inline-block;">
Return to Login
</a>

</div>
</div>
</div>

{% endblock %}
