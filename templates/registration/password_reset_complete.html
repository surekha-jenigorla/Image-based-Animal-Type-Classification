{% extends "base1.html" %}
{% load i18n %}
{% block content %}

<style>
.reset-bg {
    background: radial-gradient(circle at top left, rgba(15,157,88,0.12), transparent 50%),
                radial-gradient(circle at bottom right, rgba(22,163,74,0.08), transparent 50%);
    padding: 60px;
    border-radius: 24px;
}
</style>

<div class="reset-bg">

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

<div class="card login-card" style="
max-width:520px;
width:100%;
text-align:center;
padding:50px;
border:1px solid #D1FAE5;
box-shadow:0 25px 50px rgba(15,157,88,0.10);
">

<div style="
width:100px;height:100px;
background:#F6FFF8;
border:2px solid #0F9D58;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:30px;
font-size:42px;
color:#0F9D58;
">
<i class="fa-solid fa-shield-check"></i>
</div>

<h1>Credentials <span style="color:#0F9D58;">Updated</span></h1>

<p style="color:#6B7280; font-size:14px; line-height:1.6;">
{% translate "Your credentials were successfully updated. You may now sign in securely." %}
</p>

<a href="{% url 'login' %}" class="btn-primary"
style="margin-top:24px; display:inline-block; width:auto; padding:14px 32px;">
<i class="fa-solid fa-fingerprint"></i> {% translate "Sign In Now" %}
</a>

</div>
</div>
</div>

{% endblock %}
