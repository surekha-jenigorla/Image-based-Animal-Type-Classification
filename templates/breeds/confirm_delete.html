{% extends 'partials/base_admin.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-24 bg-white p-12 rounded-3xl shadow-xl border border-gray-100 text-center">

    <div class="text-red-500 text-5xl mb-6">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </div>

    <h1 class="text-2xl font-black text-gray-800 mb-4">
        Delete Breed
    </h1>

    <p class="text-gray-500 mb-8">
        Are you sure you want to permanently delete
        <span class="font-bold text-gray-800">{{ breed.name }}</span>?
    </p>

    <form method="post" class="flex justify-center gap-4">
        {% csrf_token %}
        <a href="{% url 'breeds:admin_breed_manage' %}"
           class="px-6 py-3 rounded-xl border font-bold">
            Cancel
        </a>

        <button type="submit"
                class="px-6 py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-black">
            Delete
        </button>
    </form>
</div>
{% endblock %}
